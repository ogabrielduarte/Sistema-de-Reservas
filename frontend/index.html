<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gabriel S. Duarte, Agatha Marinho Santos">
    <meta name="keywords" content="projeto, IFAL, hotel, reserva">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="shortcut icon" href="./assets/images/favGO.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <title>GoHotel</title>
</head>

<body>
    <header class="header">
        <a href="../frontend/index.html"> <!-- pra recarregar a página -->
            <img src="./assets/images/GHLOGO.png" class="home">
        </a>
        <!-- mesma coisa que escrevi no hotel.html-->
        <nav class="nav">
            <button class="redirect" id="reserva">faça sua reserva!</button>
            <!-- mexer pra so o admin ver "<a href=""><button class="redirect">reservas</button></a>" -->
        </nav>

        <i class="fa-regular fa-circle-user" id="perfil"></i>
    </header>
</body>
<script>
    const perfilPage = document.getElementById("perfil");
    const redirectReserva = document.getElementById("reserva");

    perfilPage.addEventListener("click", () => {
        const token = localStorage.getItem('token')

        if (token) {
            location.href = './pages/user.html'
        } else {
            alert('Faça o log-in para acessar o perfil');
            window.location.href = './pages/login.html';
        }
    });

    redirectReserva.addEventListener("click", () => {
        const token = localStorage.getItem('token')

        if (token) {
            location.href = './pages/hoteis.html'
        } else {
            alert('Faça o log-in para fazer reservas');
            window.location.href = './pages/login.html';
        }
    });
</script>

</html>
