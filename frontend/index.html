<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gabriel S. Duarte, Agatha Marinho Santos">
    <meta name="keywords" content="projeto, IFAL, hotel, reserva">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="shortcut icon" href="./assets/images/favGO.ico" type="image/x-icon">
    <link rel="stylesheet" href="./css/style.css">
    <title>GoHotel</title>
</head>

<body>
    <header class="header">
        <a href="./index.html"> <!-- pra recarregar a página -->
            <img src="./assets/images/GHLOGO.png" class="home">
        </a>

        <nav class="nav">
            <button class="redirect" id="reserva">reserve aqui</button>
            <button class="redirect" id="usuarios">usuários</button>
        </nav>

        <i class="fa-regular fa-circle-user" id="perfil"></i>
        <i class="fa-solid fa-sign-out" id="logout"></i>
    </header>
    <div class="Itext">
        <h1 id="Ititulo">GoHotel</h1>
        <p id="Isub">Cuidamos de tudo por você</p>
    </div>
    <div id="fundo"></div>
    <div id="fundo2"></div>
</body>
<script type="module">
    import { indexBG } from "./pages/modulos.js"
    indexBG()//função pro fundo alterar

    const token = localStorage.getItem('token');

    if (!token) {
        document.getElementById('logout').style.display = 'none';
    }

    const perfilPage = document.getElementById("perfil");
    const redirectReserva = document.getElementById("reserva");
    const redirectUsuarios = document.getElementById("usuarios");
    const logoutButton = document.getElementById("logout");

    perfilPage.addEventListener("click", () => {
        if (token) {
            location.href = './pages/user.html'
        } else {
            alert('Faça o log-in para acessar o perfil');
            window.location.href = './pages/login.html';
        }
    });

    redirectReserva.addEventListener("click", () => {
        if (token) {
            location.href = './pages/hoteis.html'
        } else {
            alert('Faça o log-in para fazer reservas');
            window.location.href = './pages/login.html';
        }
    });

    redirectUsuarios.addEventListener("click", () => {
        if (token) {
            location.href = './pages/usuarios.html'
        } else {
            alert('Faça o log-in para acessar os usuários');
            window.location.href = './pages/login.html';
        }
    });

    logoutButton.addEventListener("click", () => {
        if (confirm('Você quer encerrar a sessão?')) {
            localStorage.removeItem('token');
            alert('Deslogado com sucesso!');
            location.href = './index.html';
        }
    });

</script>

</html>
