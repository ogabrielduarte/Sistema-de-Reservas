<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gabriel S. Duarte, Agatha Marinho Santos">
    <meta name="keywords" content="projeto, IFAL, hotel, reserva">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="shortcut icon" href="../assets/images/favGO.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/style.css">
    <title>Perfil</title>
</head>

<body>
    <header class="header">
        <a href="../index.html">
            <img src="../assets/images/GHLOGO.png" class="home">
        </a>
        
        <nav class="nav">
            <button class="redirect" id="reserva">faça sua reserva!</button>
        </nav>

        <i class="fa-solid fa-sign-out" id="logout"></i>
    </header>

    <div id="sideUser" class="sideUser">
        <div id="Uicon" class="sideInfo"> <img src="../assets/images/Uicon.png" srcset="apesar de tudo ainda é você" ></div>
        <div id="Unome" class="sideInfo"></div>
        <div id="Uemail" class="sideInfo"></div>
    </div>

</body>
<script type="module">
    import { verificarLogin } from "./modulos.js"
    /* 






TIRE ESSE COMENTARIO ANTES DE ENVIAR ! ! ! ! ! ! ! ! ! ! ! ! ! ! ! ! ! ! ! ! ! !








    document.addEventListener("DOMContentLoaded", verificarLogin) // verificar se o login realmente ta feito
    */
    const reserva = document.getElementById("reserva");
    const logoutButton = document.querySelector(".fa-sign-out")

    reserva.addEventListener("click", () => {
        window.location.href = "./hoteis.html"
    });

    logoutButton.addEventListener("click", () => {
        if (confirm('Você quer encerrar a sessão?')) {
            localStorage.removeItem('token');
            alert('Deslogado com sucesso!');
            location.href = './index.html';
        }
    });

</script>

</html>
