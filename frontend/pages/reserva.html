<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="author" content="Gabriel S. Duarte, Agatha Marinho Santos">
    <meta name="keywords" content="projeto, IFAL, hotel, reserva">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
    <link rel="shortcut icon" href="../assets/images/favGO.ico" type="image/x-icon">
    <link rel="stylesheet" href="../css/reserva.css">

    <title>Faça sua reserva! | GoHotel</title>
</head>

<body>

    <header class="header">

        <a href="../index.html">
            <img src="../assets/images/GHLOGO.png" class="home">
        </a>
        <div class="profile">
            <p id="name"></p>
            <i class="fa-regular fa-circle-user" id="perfil"></i>
        </div>
        <i class="fa-solid fa-sign-out" id="logout"></i>

    </header>

    <div class="card-reserva">
        <!-- Card do hotel -->
    </div>

    <script type="module">

        const params = new URLSearchParams(window.location.search);

        const hotelId = params.get('id');

        const reservaContainer = document.querySelector('.card-reserva');

        async function carregarHotel() {

            try {

                if (!hotelId) {
                    reservaContainer.innerHTML = '<p>Hotel não encontrado.</p>';
                    return;
                }

                const response = await fetch(`http://localhost:3000/hoteis/${hotelId}`, {
                    method: 'GET'
                });

                if (!response.ok) {
                    throw new Error('Erro ao buscar hotel');
                }

                const objeto = await response.json();

                const hotel = objeto.hotel

                criarCardHotel(hotel);

            } catch (error) {

                console.error(error);

                reservaContainer.innerHTML = `
                <p>Erro ao carregar informações do hotel.</p>
            `;
            }
        }

        function criarCardHotel(hotel) {

            const hotelCard = document.querySelector('.card-reserva')

            // Título do hotel 
            const hotelTitulo = document.createElement('h2');
            hotelTitulo.classList.add('hotel-titulo');
            hotelTitulo.textContent = hotel.fantasia;

            // Imagem do hotel
            const hotelImg = document.createElement('img');
            hotelImg.classList.add('hotel-img');
            hotelImg.src = hotel.imagem;

            // Descrição do hotel
            const hotelDescricao = document.createElement('p');
            hotelDescricao.classList.add('hotel-descricao');
            hotelDescricao.textContent = hotel.descricao;

            // Localização do hotel
            const hotelLocalizacao = document.createElement('p');
            hotelLocalizacao.classList.add('hotel-localizacao');
            hotelLocalizacao.textContent = `Localização: ${hotel.localizacao}`;

            // DIV CONTAINER DE FORM RESERVA
            const formReserva = document.createElement('div');
            formReserva.classList.add('formReserva');

            // FORM RESERVA PROPRIAMENTE DITO
            const form = document.createElement('form');
            form.id = 'datas-reserva';

            // LABEL DATA DE ENTRADA    
            const labelEntrada = document.createElement('label');
            labelEntrada.htmlFor = 'entrada';
            labelEntrada.textContent = 'Data de Entrada:';

            // INPUT PARA DATA DE ENTRADA
            const inputEntrada = document.createElement('input');
            inputEntrada.type = 'date';
            inputEntrada.name = 'dataEntrada';
            inputEntrada.id = 'entrada';

            // LABEL DATA DE SAÍDA
            const labelSaida = document.createElement('label');
            labelSaida.htmlFor = 'saida';
            labelSaida.textContent = 'Data de Saída:';

            // INPUT PARA DATA DE SAÍDA
            const inputSaida = document.createElement('input');
            inputSaida.type = 'date';
            inputSaida.name = 'dataSaida';
            inputSaida.id = 'saida';

            // BOTÃO SEND
            const buttonSubmit = document.createElement('button');
            buttonSubmit.type = 'submit';
            buttonSubmit.classList = 'send-btn';
            buttonSubmit.id = 'send-btn';
            buttonSubmit.textContent = 'Enviar';

            // APPENDS
            form.appendChild(labelEntrada);
            form.appendChild(inputEntrada);
            form.appendChild(labelSaida);
            form.appendChild(inputSaida);
            form.appendChild(buttonSubmit);
            formReserva.appendChild(form);

            const hotelInfo = document.createElement('div');

            hotelInfo.classList.add('hotel-info');

            hotelInfo.appendChild(hotelTitulo);
            hotelInfo.appendChild(hotelDescricao);
            hotelInfo.appendChild(hotelLocalizacao);
            hotelInfo.appendChild(formReserva);

            hotelCard.appendChild(hotelImg);
            hotelCard.appendChild(hotelInfo);

            async function fetchReserva(dataEntrada, dataSaida) {

                try {

                    const urlParams = new URLSearchParams(window.location.search);

                    const idHotel = Number(urlParams.get('id'));
                    const idUsuario = Number(localStorage.getItem('id'));

                    const response = await fetch('http://localhost:3000/reservas', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({
                            dataEntrada,
                            dataSaida,
                            idUsuario,
                            idHotel
                        })
                    });

                    const data = await response.json();

                    console.log(data);


                } catch (error) {

                    console.error(error);
                    alert('Erro ao realizar reserva.');
                }
            }

            buttonSubmit.addEventListener('click', (event) => {

                event.preventDefault();

                const dataEntrada = inputEntrada.value;
                const dataSaida = inputSaida.value;

                console.log(dataEntrada);
                console.log(dataSaida);

                fetchReserva(dataEntrada, dataSaida);

            });
        }

        carregarHotel();

        // MOSTRAR NOME SE LOGADO
        document.getElementById('name').textContent = localStorage.getItem('nome');

        const logoutButton = document.getElementById("logout");

        // LOG-OUT EVENT
        logoutButton.addEventListener("click", () => {
            if (confirm('Você quer encerrar a sessão?')) {
                localStorage.removeItem('token');
                localStorage.removeItem('nome');
                alert('Deslogado com sucesso!');
                location.href = '../index.html';
            }
        });

    </script>

</body>

</html>
